<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Q4 Drill 2</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		.padding{
			padding: 10px;
		}
	</style>
</head>
<body>
	<div class="bg-dark text-light mx-5 my-5">
		<div class="row padding">
			<div class="col-lg-12">
				<h1>Heat Index Indicator</h1>
				<br>

				<form class="#">
					<div class="">
  						<label for="temp" class="form-label">Temperature:</label>
  						<input type="number" class="form-control" id="temp" placeholder="NUMBER ONLY!">
  						<br>
  						<label for="humy" class="form-label">Humidity:</label>
  						<input type="number" class="form-control" id="humy" placeholder="NUMBER ONLY!">
  						<br>
  						<button class="btn btn-light text-dark" onclick="HeatIndexChecker()">Check</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script>
		function HeatIndexChecker(){
			var temp = parseFloat(document.getElementById('temp').value);
			var humy = parseFloat(document.getElementById('humy').value);
			var heatindex = temp + (0.33 * humy) - 4;
			var message = "";

			switch(true){
			case (heatindex <= 27):
				message = "Comfortable/Cool";
				break;
			case (heatindex <= 32):
				message = "Warm";
				break;
			case (heatindex <= 37):
				message = "Hot";
				break;
			case (heatindex <= 41):
				message = "Very Hot/Caution";
				break;
			case (heatindex >= 42):
				message = "Extreme Heat/Danger";
				break;
			default: 
				message = "Heat Index could not be determined."
			}
			alert(heatindex + "\n" + message);
		}


	</script>
</body>
</html>
